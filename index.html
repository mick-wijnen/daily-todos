<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Todos — IENAI Space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== PASSWORD GATE ===== -->
  <div id="gate">
    <div class="gate-box">
      <div class="gate-logo">
        <span class="logo-dot purple"></span>
        <span class="logo-dot green"></span>
      </div>
      <p class="gate-brand-name">IENAI Space</p>
      <h1 class="gate-title">Daily Todos</h1>
      <form id="gate-form" class="gate-form">
        <input
          type="password"
          id="gate-input"
          class="form-input gate-input"
          placeholder="Password"
          autocomplete="current-password"
        >
        <button type="submit" class="btn-primary gate-btn">Unlock</button>
      </form>
      <p id="gate-error" class="gate-error">Incorrect password — try again.</p>
    </div>
  </div>

  <div id="app">

    <header class="app-header">
      <div class="brand">
        <div class="brand-logo">
          <span class="logo-dot purple"></span>
          <span class="logo-dot green"></span>
        </div>
        <span class="brand-name">IENAI Space</span>
      </div>
      <nav class="main-nav">
        <button class="nav-btn active" data-view="today">Today</button>
        <button class="nav-btn" data-view="history">History</button>
      </nav>
    </header>

    <main class="app-main">

      <!-- ===== TODAY VIEW ===== -->
      <div id="view-today" class="view active">

        <div class="view-header">
          <div class="date-display">
            <span class="day-label" id="day-label"></span>
            <h1 class="date-heading" id="date-heading"></h1>
          </div>
          <button class="btn-add-task" id="btn-open-add">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Task
          </button>
        </div>

        <div class="add-form-wrapper" id="add-form-wrapper">
          <form id="add-form" class="add-form">
            <div class="form-field">
              <input
                type="text"
                id="task-text"
                class="form-input"
                placeholder="What needs to be done?"
                autocomplete="off"
                required
              >
            </div>
            <div class="form-row">
              <div class="form-field">
                <input
                  type="text"
                  id="task-category"
                  class="form-input"
                  placeholder="Category"
                  list="category-suggestions"
                  autocomplete="off"
                >
                <datalist id="category-suggestions">
                  <option value="Engineering">
                  <option value="Research">
                  <option value="Meetings">
                  <option value="Admin">
                  <option value="Review">
                </datalist>
              </div>
              <div class="form-field form-field-grow">
                <input
                  type="text"
                  id="task-note"
                  class="form-input"
                  placeholder="Note (optional)"
                >
              </div>
            </div>
            <div class="form-actions">
              <button type="button" id="btn-cancel-add" class="btn-secondary">Cancel</button>
              <button type="submit" class="btn-primary">Add Task</button>
            </div>
          </form>
        </div>

        <div id="loading-today" class="loading-state">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </div>

        <div id="pending-tasks" class="task-list">
          <div class="empty-state" id="empty-pending">
            <p>No pending tasks — add one above.</p>
          </div>
        </div>

        <div class="completed-section" id="completed-section">
          <button class="completed-toggle" id="completed-toggle">
            <span class="toggle-label">Completed</span>
            <div class="toggle-right">
              <span class="count-badge" id="completed-count">0</span>
              <svg class="toggle-icon" id="toggle-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </div>
          </button>
          <div id="completed-tasks" class="task-list completed-list"></div>
        </div>

      </div>

      <!-- ===== HISTORY VIEW ===== -->
      <div id="view-history" class="view">
        <div class="view-header">
          <h1 class="date-heading">History</h1>
        </div>
        <div id="history-container"></div>
      </div>

    </main>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="app.js?v=4"></script>
</body>
</html>
